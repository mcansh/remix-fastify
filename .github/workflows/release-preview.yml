name: 🚀 Release (preview)
on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "!**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-slim

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Enable corepack
        run: |
          npm i -g corepack@latest
          corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: ⎔ Enable corepack
        run: |
          npm i -g corepack@latest
          corepack enable

      - name: 🟧 Install dependencies
        run: pnpm install --recursive --frozen-lockfile --strict-peer-dependencies

      - name: 🔀 Prepare npm config
        parallel:
          - name: 🔐 Prepare npm auth snippet
            run: |
              {
                echo "registry=https://registry.npmjs.org"
                echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              } > /tmp/npmrc-auth
          - name: 🟧 Prepare publish-branch snippet
            run: |
              echo "publish-branch=$(git branch --show-current)" > /tmp/npmrc-publish-branch

      - name: 🧩 Write npm config
        run: |
          cat /tmp/npmrc-auth /tmp/npmrc-publish-branch >> ~/.npmrc

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🚀 Publish PR
        run: pnpm dlx pkg-pr-new publish --compact './packages/*' --template './examples/*'
